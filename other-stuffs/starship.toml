format = """
[в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ>](bold black)
[в”Ӯ](bold black)\
$os\
$hostname\
$username\
$directory\
$fill\
$cmd_duration\
$git_branch\
$git_status\
${custom.checkdir}
[в””в”Җ](bold black)\
$character\
"""

# symbols for copy paste
# arrows right [оӮ°]  arrow left     [у°Қһ]
# cursor       [вқҜ]  reverse cursor [вқ®[
# linux os     [оҜҶ]  documents      [у°Ҳҷ]
# documents    [у°Ҳҷп„Ә] downloads      [пҖҷ]
# music        [пҖҒ]  pictures       [пҖҫ]
# l.c          [оҳһ]  l.docker       [пҢҲ]
# l.elixir     [оүө]  l.elm          [оҳ¬]
# l.git.branch [пҗҳ]  l.golang       [оҳ§]
# l.haskell    [оқ·]  l.java         [оү–]
# l.julia      [оҳӨ]  l.nodejs       [оңҳ]
# l.nim        [у°ҶҘ]  l.rust         [оһЁ]
# l.scala      [оң·]

# Disable the blank line at the start of the prompt
add_newline = false

# do not show version for packages (python...)
[package]
disabled = true

# .........................
[fill]
symbol = ' '

# representdds the current operating system
[os]
disabled = false # Disabled by default
style = "yellow"
[os.symbols]
Arch = " п…ј "

[hostname]
ssh_only = false
format =  "[$hostname](bold red)/"
trim_at = "."
disabled = false

# username
[username]
show_always = true
style_user = "fg:white"
style_root = "fg:red"
format = '[$user]($style) '
disabled = false

[directory]
format = '[$path]($style)'
style = "blue"
home_symbol = '[у°Ӣң ~] '
truncation_symbol = "вҖҰ/"
truncation_length = 1
fish_style_pwd_dir_length = 1

[directory.substitutions]
"Books" = "(оӘӨ)Books"
"Zk" = "(у°Ҳҷ)Zk"
"Obsidian" = "(у°Ҳҷ)Obsidian"
"730" = "(у°Ҳҷп„Ә)730"
"Workspace" = "(у°Ҳҷ)Workspace"
"Downloads" = "(пҖҷ)Downloads"
"Music" = "(пҖҒ)Music"
"Images" = "(пҖҫ)Images"
"Video" = "(п”¬)Video"

[custom.checkdir]
description = "check directory"
command = "checkdir"
format = '\[[$output]($style)\]'
style = "cyan"
when = "true"

[cmd_duration]
min_time = 500
show_milliseconds = true
format = "В» [$duration]($style) "
style = "white italic"

[git_status]
format = '([\[пҗҳ$all_status$ahead_behind\]]($style) )'
conflicted = '=$count'
stashed = '\$$count'
deleted = 'вңҳ$count'
renamed = 'В»$count'
modified = '!$count'
staged = '+$count'
untracked = '?$count'

[git_branch]
symbol = 'пҮ“ '
truncation_length = 4
truncation_symbol = ''
# ignore_branches = ['master', 'main']

[time]
disabled = false
style = 'white'
format = '[$time]($style) '
time_format = '[пҒі%b%m](пҗә%H:%M)'

[character]
error_symbol = '[вқҜ](bold red blink)'
vimcmd_symbol = '[вқ®](bold green blink)'
